services:
  ai-product-comparator:
    container_name: ai-product-comparator
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Python settings
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1